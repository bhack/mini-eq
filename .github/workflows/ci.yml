name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      flatpak_runtime_smoke:
        description: Run the experimental Flatpak PipeWire/WirePlumber routing smoke test
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-24.04

    outputs:
      flatpak: ${{ steps.filter.outputs.flatpak }}
      test: ${{ steps.filter.outputs.test }}
      tooling: ${{ steps.filter.outputs.tooling }}
      wp04: ${{ steps.filter.outputs.wp04 }}

    steps:
      - name: Detect changed files
        id: filter
        env:
          BEFORE: ${{ github.event.before }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          files="$(mktemp)"

          set_all() {
            {
              echo "test=true"
              echo "tooling=true"
              echo "wp04=true"
              echo "flatpak=true"
            } >> "$GITHUB_OUTPUT"
          }

          case "$GITHUB_EVENT_NAME" in
            workflow_dispatch)
              set_all
              exit 0
              ;;
            pull_request)
              gh api --paginate "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/files" --jq '.[].filename' > "$files"
              ;;
            push)
              if [[ -z "${BEFORE:-}" || "$BEFORE" =~ ^0+$ ]]; then
                set_all
                exit 0
              fi
              gh api "repos/$GITHUB_REPOSITORY/compare/$BEFORE...$GITHUB_SHA" --jq '.files[].filename' > "$files"
              ;;
            *)
              set_all
              exit 0
              ;;
          esac

          test=false
          tooling=false
          wp04=false
          flatpak=false

          while IFS= read -r path; do
            case "$path" in
              .github/workflows/ci.yml)
                test=true
                tooling=true
                wp04=true
                flatpak=true
                ;;
              README.md|pyproject.toml|MANIFEST.in|src/*|tests/*|data/*|extensions/*)
                test=true
                ;;
              tools/check_gnome_shell_extension.py|tools/pack_gnome_shell_extension.sh)
                test=true
                ;;
            esac

            case "$path" in
              tools/*)
                tooling=true
                ;;
            esac

            case "$path" in
              .github/workflows/ci.yml|docker/ubuntu-24.04-wp04.Dockerfile|tools/check_wireplumber_gi.py|src/mini_eq/wireplumber_backend.py)
                wp04=true
                ;;
            esac

            case "$path" in
              .github/workflows/ci.yml|io.github.bhack.mini-eq.yaml|python3-dependencies.yaml|flatpak/*|src/*|data/*|pyproject.toml|MANIFEST.in|tools/check_wireplumber_gi.py)
                flatpak=true
                ;;
            esac
          done < "$files"

          {
            echo "test=$test"
            echo "tooling=$tooling"
            echo "wp04=$wp04"
            echo "flatpak=$flatpak"
          } >> "$GITHUB_OUTPUT"

          {
            echo "### CI scope"
            echo
            echo "- test: \`$test\`"
            echo "- tooling: \`$tooling\`"
            echo "- wireplumber-0-4-compat: \`$wp04\`"
            echo "- flatpak: \`$flatpak\`"
          } >> "$GITHUB_STEP_SUMMARY"

  tooling:
    needs: changes
    if: ${{ always() }}
    runs-on: ubuntu-24.04

    steps:
      - name: Require change detection
        if: ${{ needs.changes.result != 'success' }}
        run: exit 1

      - name: Skip unchanged scope
        if: ${{ needs.changes.outputs.tooling != 'true' }}
        run: echo "No maintainer-tooling changes detected; skipping tooling job work."

      - name: Check out repository
        if: ${{ needs.changes.outputs.tooling == 'true' }}
        uses: actions/checkout@v6

      - name: Install Python tooling
        if: ${{ needs.changes.outputs.tooling == 'true' }}
        run: |
          python3 -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install ruff

      - name: Lint
        if: ${{ needs.changes.outputs.tooling == 'true' }}
        run: .venv/bin/python -m ruff check .

      - name: Check formatting
        if: ${{ needs.changes.outputs.tooling == 'true' }}
        run: .venv/bin/python -m ruff format --check .

  test:
    needs: changes
    if: ${{ always() }}
    runs-on: ubuntu-24.04

    steps:
      - name: Require change detection
        if: ${{ needs.changes.result != 'success' }}
        run: exit 1

      - name: Skip unchanged scope
        if: ${{ needs.changes.outputs.test != 'true' }}
        run: echo "No Python/package changes detected; skipping test job work."

      - name: Check out repository
        if: ${{ needs.changes.outputs.test == 'true' }}
        uses: actions/checkout@v6

      - name: Install system dependencies
        if: ${{ needs.changes.outputs.test == 'true' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gir1.2-adw-1 \
            gir1.2-gtk-4.0 \
            pipewire \
            pipewire-jack \
            python3-cairo \
            python3-gi \
            python3-pip \
            python3-venv \
            wireplumber
          if apt-cache show gir1.2-wp-0.5 >/dev/null 2>&1; then
            sudo apt-get install -y gir1.2-wp-0.5
          else
            sudo apt-get install -y gir1.2-wp-0.4
          fi

      - name: Install Python dependencies
        if: ${{ needs.changes.outputs.test == 'true' }}
        run: |
          python3 -m venv --system-site-packages .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -e '.[dev]'

      - name: Lint
        if: ${{ needs.changes.outputs.test == 'true' }}
        run: .venv/bin/python -m ruff check .

      - name: Check formatting
        if: ${{ needs.changes.outputs.test == 'true' }}
        run: .venv/bin/python -m ruff format --check .

      - name: Test
        if: ${{ needs.changes.outputs.test == 'true' }}
        run: .venv/bin/python -m pytest -q

      - name: Build package
        if: ${{ needs.changes.outputs.test == 'true' }}
        run: .venv/bin/python -m build

      - name: Check package metadata
        if: ${{ needs.changes.outputs.test == 'true' }}
        run: .venv/bin/python -m twine check dist/*

      - name: Smoke-test wheel CLI
        if: ${{ needs.changes.outputs.test == 'true' }}
        run: |
          python3 -m venv /tmp/mini-eq-wheel-test
          /tmp/mini-eq-wheel-test/bin/python -m pip install dist/mini_eq-*.whl
          /tmp/mini-eq-wheel-test/bin/mini-eq --help

      - name: Upload package artifacts
        if: ${{ needs.changes.outputs.test == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: mini-eq-dist
          path: dist/*
          if-no-files-found: error

  wireplumber-0-4-compat:
    needs: changes
    if: ${{ always() }}
    runs-on: ubuntu-24.04

    steps:
      - name: Require change detection
        if: ${{ needs.changes.result != 'success' }}
        run: exit 1

      - name: Skip unchanged scope
        if: ${{ needs.changes.outputs.wp04 != 'true' }}
        run: echo "No WirePlumber 0.4 compatibility changes detected; skipping compatibility job work."

      - name: Check out repository
        if: ${{ needs.changes.outputs.wp04 == 'true' }}
        uses: actions/checkout@v6

      - name: Build WirePlumber 0.4 compatibility image
        if: ${{ needs.changes.outputs.wp04 == 'true' }}
        run: docker build -f docker/ubuntu-24.04-wp04.Dockerfile -t mini-eq:wp04 .

      - name: Check WirePlumber 0.4 GI compatibility
        if: ${{ needs.changes.outputs.wp04 == 'true' }}
        run: docker run --rm mini-eq:wp04

  flatpak:
    needs: changes
    if: ${{ always() }}
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50@sha256:9d3a99bef793cf99f55b0106130e68a781fd0815c8d2954f26e1ac9253b19e57
      options: --privileged

    steps:
      - name: Require change detection
        if: ${{ needs.changes.result != 'success' }}
        run: exit 1

      - name: Skip unchanged scope
        if: ${{ needs.changes.outputs.flatpak != 'true' }}
        run: echo "No Flatpak-relevant changes detected; skipping Flatpak job work."

      - name: Check out repository
        if: ${{ needs.changes.outputs.flatpak == 'true' }}
        uses: actions/checkout@v6

      - name: Configure Flathub remote
        if: ${{ needs.changes.outputs.flatpak == 'true' }}
        run: |
          flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak --user remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Build Flatpak
        if: ${{ needs.changes.outputs.flatpak == 'true' }}
        uses: flatpak/flatpak-github-actions/flatpak-builder@401fe28a8384095fc1531b9d320b292f0ee45adb
        with:
          bundle: mini-eq.flatpak
          manifest-path: io.github.bhack.mini-eq.yaml
          upload-artifact: false

      - name: Install built Flatpak
        if: ${{ needs.changes.outputs.flatpak == 'true' }}
        run: flatpak --user install -y ./mini-eq.flatpak

      - name: Smoke-test Flatpak CLI
        if: ${{ needs.changes.outputs.flatpak == 'true' }}
        run: flatpak run io.github.bhack.mini-eq --help

      - name: Check WirePlumber 0.5 GI compatibility
        if: ${{ needs.changes.outputs.flatpak == 'true' }}
        run: |
          flatpak run --filesystem="$PWD":ro --command=python3 io.github.bhack.mini-eq \
            "$PWD/tools/check_wireplumber_gi.py" --expect-version 0.5

      - name: Smoke-test Flatpak runtime modules
        if: ${{ needs.changes.outputs.flatpak == 'true' }}
        run: |
          flatpak run --command=python3 io.github.bhack.mini-eq - <<'PY'
          from pathlib import Path

          required_files = [
              "/app/lib/pipewire-0.3/libpipewire-module-filter-chain.so",
              "/app/lib/spa-0.2/filter-graph/libspa-filter-graph.so",
              "/app/lib/spa-0.2/filter-graph/libspa-filter-graph-plugin-builtin.so",
          ]

          missing = [path for path in required_files if not Path(path).exists()]
          if missing:
              raise SystemExit(f"missing Flatpak runtime file(s): {', '.join(missing)}")
          PY

          flatpak run --command=python3 io.github.bhack.mini-eq - <<'PY'
          from pathlib import Path

          required_license_files = [
              "/app/share/licenses/io.github.bhack.mini-eq/mini-eq/LICENSE",
              "/app/share/licenses/io.github.bhack.mini-eq/pipewire-filter-chain-module/COPYING",
              "/app/share/licenses/io.github.bhack.mini-eq/pipewire-filter-chain-module/LICENSE",
              "/app/share/licenses/io.github.bhack.mini-eq/wireplumber/LICENSE",
          ]

          missing = [path for path in required_license_files if not Path(path).exists()]
          if missing:
              raise SystemExit(f"missing Flatpak license file(s): {', '.join(missing)}")
          PY

          flatpak run --command=python3 io.github.bhack.mini-eq - <<'PY'
          import importlib

          required_modules = ["numpy", "jack", "_jack"]

          missing = []
          for name in required_modules:
              try:
                  importlib.import_module(name)
              except Exception as exc:
                  missing.append(f"{name}: {exc}")
          if missing:
              raise SystemExit(f"missing Python analyzer module(s): {', '.join(missing)}")
          PY

  flatpak-runtime-smoke:
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.flatpak_runtime_smoke }}
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    continue-on-error: true

    steps:
      - name: Require change detection
        if: ${{ needs.changes.result != 'success' }}
        run: exit 1

      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Flatpak and PipeWire test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            dbus-user-session \
            flatpak \
            flatpak-builder \
            jq \
            pipewire \
            pipewire-bin \
            wireplumber

      - name: Configure Flathub remote
        run: flatpak remote-add --if-not-exists --user flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Build and install local Flatpak
        run: |
          flatpak-builder \
            --user \
            --install \
            --force-clean \
            --install-deps-from=flathub \
            flatpak-build io.github.bhack.mini-eq.yaml

      - name: Run experimental Flatpak runtime smoke
        run: |
          set -euo pipefail

          runtime_dir="/run/user/$(id -u)"
          config_home="$(mktemp -d)"

          sudo mkdir -p "$runtime_dir"
          sudo chown "$(id -u):$(id -g)" "$runtime_dir"
          chmod 700 "$runtime_dir"
          mkdir -p "$config_home/pipewire/pipewire.conf.d"

          cat > "$config_home/pipewire/pipewire.conf.d/10-mini-eq-ci-null-sink.conf" <<'EOF'
          context.objects = [
              { factory = adapter
                  args = {
                      factory.name     = support.null-audio-sink
                      node.name        = "ci_null_sink"
                      node.description = "CI Null Sink"
                      media.class      = "Audio/Sink"
                      audio.position   = "FL,FR"
                      adapter.auto-port-config = {
                          mode     = dsp
                          monitor  = true
                          position = preserve
                      }
                  }
              }
          ]
          EOF

          export XDG_RUNTIME_DIR="$runtime_dir"
          export XDG_CONFIG_HOME="$config_home"

          dbus-run-session -- bash <<'SH'
          set -euo pipefail

          pipewire >"$XDG_RUNTIME_DIR/pipewire.log" 2>&1 &
          pipewire_pid=$!
          wireplumber >"$XDG_RUNTIME_DIR/wireplumber.log" 2>&1 &
          wireplumber_pid=$!

          cleanup() {
            kill "$wireplumber_pid" "$pipewire_pid" 2>/dev/null || true
            wait "$wireplumber_pid" 2>/dev/null || true
            wait "$pipewire_pid" 2>/dev/null || true
          }

          dump_logs() {
            echo "## wpctl status"
            wpctl status 2>/dev/null || true
            echo "## pipewire.log"
            sed -n '1,240p' "$XDG_RUNTIME_DIR/pipewire.log" 2>/dev/null || true
            echo "## wireplumber.log"
            sed -n '1,240p' "$XDG_RUNTIME_DIR/wireplumber.log" 2>/dev/null || true
          }

          trap cleanup EXIT
          trap dump_logs ERR

          ci_sink_id=""
          default_set=false
          for _ in $(seq 1 200); do
            ci_sink_id="$(
              pw-dump 2>/dev/null \
                | jq -r '.[] | select(.type=="PipeWire:Interface:Node" and .info.props["node.name"]=="ci_null_sink") | .id' \
                | head -n 1
            )"
            if [[ -n "$ci_sink_id" ]] && wpctl set-default "$ci_sink_id" >/dev/null 2>&1; then
              default_set=true
              break
            fi
            sleep 0.1
          done

          if [[ "$default_set" != true ]]; then
            echo "failed to set ci_null_sink as the default PipeWire sink"
            exit 1
          fi

          python3 tools/check_flatpak_runtime.py \
            --app-ref io.github.bhack.mini-eq//master \
            --duration 8 \
            --timeout 20
          SH
