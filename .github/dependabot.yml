version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      python-runtime:
        dependency-type: "production"
        patterns:
          - "*"
      python-dev:
        dependency-type: "development"
        patterns:
          - "*"
